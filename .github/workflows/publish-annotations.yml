name: publish annotations

# Annotations carry their own <Version> in the .fsproj, decoupled from the tool's
# release tag. Publish on every push to main; --skip-duplicate makes the push a
# no-op unless that version was bumped.
on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write # required for NuGet login

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Pack annotations
        run: dotnet pack Mutannot.Annotations/Mutannot.Annotations.fsproj -c Release -o out

      - name: NuGet login
        uses: NuGet/login@v1
        id: login
        with:
          user: svenvanheugten

      - name: Push to NuGet.org
        run: >
          dotnet nuget push "out/*.nupkg"
          --source https://api.nuget.org/v3/index.json
          --api-key "${{ steps.login.outputs.NUGET_API_KEY }}"
          --skip-duplicate
