name: publish

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write # required for NuGet login

jobs:
  # Gate publishing on a full nix build so we only push to NuGet if everything
  # (tests included) passed for the tagged commit.
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: cachix/install-nix-action@v31
      - run: nix build --print-build-logs

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: "10.0.x"

      - name: Derive tool version from tag
        run: echo "TOOL_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Pack tool
        run: dotnet pack Mutannot/Mutannot.fsproj -c Release -p:Version="$TOOL_VERSION" -o out

      - name: NuGet login
        uses: NuGet/login@v1
        id: login
        with:
          user: svenvanheugten

      - name: Push to NuGet.org
        run: >
          dotnet nuget push "out/*.nupkg"
          --source https://api.nuget.org/v3/index.json
          --api-key "${{ steps.login.outputs.NUGET_API_KEY }}"
          --skip-duplicate
